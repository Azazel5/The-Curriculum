# fly.toml app configuration file
#
# Create with: fly launch
# Deploy with: fly deploy
#
# NOTE: Replace app name after `fly launch`, or let flyctl manage it.

app = "the-curriculum"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Required for migration command and any CLI usage.
  FLASK_APP = "app:create_app"

  # Optional but recommended so Open Graph + email links become absolute.
  # Prefer setting this as a secret if you want to keep config centralized.
  # PUBLIC_BASE_URL = "https://the-curriculum.fly.dev"

[deploy]
  # Runs on each deploy before the new VM is promoted.
  release_command = "flask db upgrade"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/login"

